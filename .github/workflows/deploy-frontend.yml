name: 프론트엔드 배포

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/p-log-frontend

jobs:
  verify:
    name: 빌드 검증
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_BASE_URL: /api
      NEXT_PUBLIC_OWNER_USER_ID: 00000000-0000-4000-8000-000000000000

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: pnpm 설정
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.1

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      - name: 애플리케이션 빌드
        run: pnpm build

  deploy:
    name: Docker Hub 이미지 배포 및 Lightsail 배포
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 이미지 빌드 및 푸시
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_OWNER_USER_ID=${{ secrets.NEXT_PUBLIC_OWNER_USER_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: SSH 키 설정
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/lightsail_key
          chmod 600 ~/.ssh/lightsail_key
          ssh-keyscan -H "${{ secrets.LIGHTSAIL_HOST }}" >> ~/.ssh/known_hosts

      - name: 서버에서 프론트엔드 갱신
        run: |
          ssh -i ~/.ssh/lightsail_key "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}" << 'EOF'
            set -e
            cd "${{ secrets.LIGHTSAIL_DEPLOY_PATH }}"
            docker-compose pull frontend
            docker-compose up -d --no-deps --force-recreate frontend
            docker image prune -f
          EOF
